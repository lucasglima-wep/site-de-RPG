<body>
    <style>

        .perfil-menu{
position:relative;
}

.dropdown{
position:absolute;
top:50px;
right:0;
background:#1e1e1e;
border-radius:8px;
padding:10px;
display:none;
flex-direction:column;
min-width:150px;
box-shadow:0 10px 20px rgba(0,0,0,0.5);
}

.dropdown a{
color:white;
text-decoration:none;
padding:8px;
border-radius:6px;
}

.dropdown a:hover{
background:#333;
}
    </style>
</body>

<div class="perfil-menu">

<img src="img/IMG_0032.JPG" class="avatar" onclick="abrirMenu()">

<div class="dropdown" id="menuPerfil">

</div>

</div>


<script>

    function abrirMenu(){
let menu = document.getElementById("menuPerfil");

if(menu.style.display === "flex"){
menu.style.display = "none";
}else{
menu.style.display = "flex";
}
}

</script>
