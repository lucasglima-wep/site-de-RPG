<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/tela-inicial.css">
    <title>Document</title>
</head>

<style>

/* TOPO */

.topo{

display:flex;
justify-content:space-between;
align-items:center;

background:#e9e9e9;
padding:10px 20px;

}

/* LOGO */

.logo-area{

display:flex;
align-items:center;
gap:10px;

}

.logo-icon{

width:28px;
height:28px;
background:#9c2b29;
border-radius:6px;

}

.logo-text{

display:flex;
flex-direction:column;

}

.titulo{

color:#e53935;
font-weight:bold;
font-size:14px;

}

.sub{

font-size:10px;
color:#777;

}

/* LADO DIREITO */

.menu-direita{

display:flex;
align-items:center;
gap:20px;

}

/* STATUS */

.status{

display:flex;
align-items:center;
gap:6px;

background:#f3f3f3;
padding:6px 12px;
border-radius:20px;

font-size:12px;

}

.bolinha{

width:8px;
height:8px;
background:#3ddc84;
border-radius:50%;

}

/* ICONES */

.icone{
font-size:16px;
cursor:pointer;
}

/* SESSÕES */

.sessoes{

font-size:12px;
color:#444;

}

/* USUARIO */

.usuario{

display:flex;
align-items:center;
gap:8px;

}

.avatar{

width:28px;
height:28px;
border-radius:50%;

}


</style>
 <!-- topo -->
<body>
    <header class="topo">

        <div class="logo-area">
        
        <img src="img/IMG_0032.JPG" class="logo-icon">
        
        <div class="logo-text">
        <span class="titulo">RUBY RPG</span>
        <span class="sub">POR PANTEON TABLE</span>
        </div>
        
        </div>
        
        
        <div class="menu-direita">
        
        <div class="status">
        <span class="bolinha"></span>
        Explorando
        </div>
        
        <div class="icone">⚙</div>
        
        <div class="sessoes">
        🔥 15 sessões
        </div>
        
        <div class="usuario">
        
        <div class="nome">Guto</div>
        
        <img src="avatar.jpg" class="avatar">
        
        </div>
        
        </div>
        
        </header>  
  




    <div class="container">

        <!-- SIDEBAR --> 
        
        <div class="sidebar" id="sidebar">
        <div class="logo">
        <button id="toggle">
        <i class="bi bi-list"></i>
        </button>
        

</body>
</html>
